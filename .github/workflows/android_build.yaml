name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Debug build: runs on every push / PR ──────────────────────────────────
  build-debug:
    name: Build debug APK and run tests
    runs-on: ubuntu-latest
    # Skip when manually triggered for release
    if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      - name: Build Project with gradle
        run: ./gradlew assembleDebug

      - name: Run Local Tests
        run: ./gradlew test

      - name: Lint Checks
        run: ./gradlew ktlintCheck

        # Upload all build artifacts in separate steps. This can be shortened once https://github.com/actions/upload-artifact/pull/354 is merged.
      - name: Upload artifact nextplayer-universal-debug.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-universal-debug.apk
          path: ./app/build/outputs/apk/debug/app-universal-debug.apk
      - name: Upload artifact nextplayer-arm64-v8a-debug.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-arm64-v8a-debug.apk
          path: ./app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
      - name: Upload artifact nextplayer-armeabi-v7a-debug.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-armeabi-v7a-debug.apk
          path: ./app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk
      - name: Upload artifact nextplayer-x86_64-debug.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-x86_64-debug.apk
          path: ./app/build/outputs/apk/debug/app-x86_64-debug.apk
      - name: Upload artifact nextplayer-x86-debug.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-x86-debug.apk
          path: ./app/build/outputs/apk/debug/app-x86-debug.apk

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-reports
          path: app/build/reports

  # ── Release build: only on manual workflow_dispatch ───────────────────────
  build-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload artifact nextplayer-arm64-v8a-release.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-arm64-v8a-release.apk
          path: ./app/build/outputs/apk/release/app-arm64-v8a-release.apk

      - name: Upload artifact nextplayer-armeabi-v7a-release.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-armeabi-v7a-release.apk
          path: ./app/build/outputs/apk/release/app-armeabi-v7a-release.apk

      - name: Upload artifact nextplayer-universal-release.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-universal-release.apk
          path: ./app/build/outputs/apk/release/app-universal-release.apk
